services:
  web:
    container_name: giscatalog_web
    build: .
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
  db:
    container_name: giscatalog_db
    image: postgis/postgis:16-3.5
    env_file:
      - .env
    volumes:
      - en_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  en_postgres_data:
