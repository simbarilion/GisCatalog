services:
  web:
    container_name: giscatalog_web
    build: .
    env_file:
      - .env
    environment:
      - SECRET_API_KEY=${SECRET_API_KEY}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_PASSWORD=${DB_PASSWORD}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    volumes:
      - ./logs:/app/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
  db:
    container_name: giscatalog_db
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: gis_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRESQL_LOG_MIN_MESSAGES: warning
    volumes:
      - en_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  en_postgres_data:
